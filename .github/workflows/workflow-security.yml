name: Workflow Security

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/zizmor.yml"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/zizmor.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  # pip >=26 honors this to reject packages uploaded within this window.
  PIP_EXCLUDE_NEWER: "6 days"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run actionlint
        run: |
          docker run --rm -v "$PWD":/repo -w /repo rhysd/actionlint:1.7.7 -shellcheck=

  zizmor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install zizmor
        run: python3 -m pip install --disable-pip-version-check --no-cache-dir --upgrade zizmor
      - name: Run zizmor (high severity gate)
        run: |
          zizmor --format=github --no-progress --config .github/zizmor.yml --min-severity high .github/workflows/*.yml
