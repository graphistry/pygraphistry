name: Publish Python 🐍 distributions 📦 to PyPI and TestPyPI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

  #TODO: Gate last step on release create? Unclear how to do the step's `if`
  #release:
  #  types: [created]

env:
  UV_EXCLUDE_NEWER: "6 days"
  PIP_EXCLUDE_NEWER: "6 days"

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI and TestPyPI
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # Configure required reviewers on the `pypi-release` environment in repository settings.
    # This creates a human approval gate before the publish job can mint OIDC creds.
    environment:
      name: pypi-release

    steps:
      - uses: actions/checkout@v4
        with:  # fetch tag for versioneer
          fetch-depth: 0

      - name: Verify trusted release trigger
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Refuse tag publishes that do not point to commits in master history.
            git fetch --no-tags origin master
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
              echo "::error::Ref ${GITHUB_REF} (${GITHUB_SHA}) is not in origin/master history; refusing publish."
              exit 1
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Manual publishes are restricted to master ref.
            if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
              echo "::error::workflow_dispatch publishes are only allowed from refs/heads/master."
              exit 1
            fi
          else
            echo "::error::Unexpected event ${GITHUB_EVENT_NAME}; refusing publish."
            exit 1
          fi

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install pypa/build
        run: >-
          python -m pip install -e .[build]

      - name: Build a binary wheel and a source tarball
        run: >-
          ./bin/build.sh

      - name: Publish distribution 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
