  test-networkx-scipy-policy:
    name: test-networkx-scipy-policy (${{ matrix.label }}, py${{ matrix.python-version }})
    needs: [changes, generate-lockfiles]
    if: ${{ (needs.changes.outputs.python == 'true' || needs.changes.outputs.gfql == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && !(needs.changes.outputs.docs_only_latest == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: nx-lower-no-scipy
            python-version: '3.8'
            lock-profile: test-networkx-policy-lower-no-scipy
          - label: nx-lower-scipy
            python-version: '3.8'
            lock-profile: test-networkx-policy-lower-scipy
          - label: nx-upper-scipy
            python-version: '3.12'
            lock-profile: test-networkx-policy-upper-scipy
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        lfs: true
        persist-credentials: false

    - name: Download lockfiles
      uses: actions/download-artifact@v4
      with:
        name: lockfiles
        path: requirements

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install NetworkX policy dependencies
      run: |
        python -m venv pygraphistry
        source pygraphistry/bin/activate
        python -m pip install --upgrade pip uv
        uv pip install --require-hashes -r requirements/${{ matrix.lock-profile }}-py${{ matrix.python-version }}.lock
        uv pip install -e . --no-deps
        python - <<'PY'
        import importlib.util
        import networkx
        print("networkx:", networkx.__version__)
        if importlib.util.find_spec("scipy") is None:
            print("scipy: not installed")
        else:
            import scipy
            print("scipy:", scipy.__version__)
        PY

    - name: Run NetworkX CALL policy tests
      run: |
        source pygraphistry/bin/activate
        python -B -m pytest -q graphistry/tests/compute/gfql/cypher/test_lowering.py -k 'networkx'
        python -B -m pytest -q graphistry/tests/plugins/test_networkx.py

  test-minimal-python:
    # Lite sentinel: oldest + newest Python only, heavy test files excluded. Gates all downstream.
    # Non-GFQL deferred files run in test-minimal-python-rest; GFQL-heavy files run in test-gfql-core.
    needs: [changes, python-lint-types, generate-lockfiles]
    # Run if Python files changed OR infrastructure changed OR manual/scheduled run
    if: ${{ (needs.changes.outputs.python == 'true' || needs.changes.outputs.ai == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && !(needs.changes.outputs.docs_only_latest == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        python-version: [3.8, '3.14']

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        lfs: true
        persist-credentials: false


    - name: Download lockfiles
      uses: actions/download-artifact@v4
      with:
        name: lockfiles
        path: requirements

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m venv pygraphistry
        source pygraphistry/bin/activate
        python -m pip install --upgrade pip uv
        uv pip install --require-hashes -r requirements/test-py${{ matrix.python-version }}.lock
        uv pip install -e . --no-deps

    - name: Test pip install (Docker)
      env:
        PYTHON_VERSION: ${{ matrix.python-version }}
      run: |
        ./docker/test-pip-install.sh

    - name: Minimal lite tests (fast sentinel gate)
      run: |
        source pygraphistry/bin/activate
        ./bin/test-minimal-lite.sh -n auto

  cypher-frontend-ci-gates:
    name: cypher-frontend-ci-gates
    # Keep cypher frontend gates chained to strict typing + differential/parity
    # + surface guard + full-suite sentinel.
    needs: [changes, test-minimal-python, cypher-frontend-strict-typing, cypher-frontend-differential-parity, cypher-frontend-surface-guard]
    if: ${{ (needs.changes.outputs.cypher_frontend_ci == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && !(needs.changes.outputs.docs_only_latest == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
    - name: Report cypher frontend gate status
      run: |
        echo "Cypher frontend gates passed:"
        echo "- cypher-frontend-strict-typing (py3.12)"
        echo "- cypher-frontend-differential-parity (py3.12)"
        echo "- cypher-frontend-surface-guard"
        echo "- test-minimal-python (lite sentinel gate)"


  test-minimal-python-rest:
    # Middle versions (3.9-3.13) + non-GFQL deferred files, run after sentinel + GFQL core pass.
    needs: [changes, test-minimal-python, test-gfql-core, generate-lockfiles]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11, 3.12, '3.13']

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        lfs: true
        persist-credentials: false


    - name: Download lockfiles
      uses: actions/download-artifact@v4
      with:
        name: lockfiles
        path: requirements

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m venv pygraphistry
        source pygraphistry/bin/activate
        python -m pip install --upgrade pip uv
        uv pip install --require-hashes -r requirements/test-py${{ matrix.python-version }}.lock
        uv pip install -e . --no-deps

    - name: Test pip install (Docker)
      env:
        PYTHON_VERSION: ${{ matrix.python-version }}
      run: |
        ./docker/test-pip-install.sh

    - name: Minimal rest tests (middle versions and non-GFQL deferred files)
      run: |
        source pygraphistry/bin/activate
        ./bin/test-minimal.sh -n auto


  # GFQL-heavy tests split out of the minimal gate to reduce critical path.
  # Runs in parallel with downstream jobs instead of blocking them.
  test-gfql-core:
    needs: [changes, python-lint-types, generate-lockfiles]
    if: ${{ (needs.changes.outputs.python == 'true' || needs.changes.outputs.gfql == 'true' || needs.changes.outputs.ai == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && !(needs.changes.outputs.docs_only_latest == 'true' && (github.event_name == 'push' || github.event_name == 'pull_request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      matrix:
        python-version: ['3.12', '3.14']

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        lfs: true
        persist-credentials: false

    - name: Download lockfiles
      uses: actions/download-artifact@v4
      with:
        name: lockfiles
        path: requirements

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
