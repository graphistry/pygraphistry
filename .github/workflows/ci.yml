        python -m pip install --upgrade pip uv
        uv pip install --require-hashes -r requirements/test-py${{ matrix.python-version }}.lock
        uv pip install -e . --no-deps

    - name: GFQL core tests with coverage audit
      if: ${{ matrix.python-version == '3.12' }}
      run: |
        source pygraphistry/bin/activate
        mkdir -p build/gfql-coverage-audit
        COVERAGE_FILE=build/gfql-coverage-audit/coverage.gfql-py3.12 python -B -m pytest -vv -n auto \
          --cov=graphistry/compute \
          --cov-report= \
          graphistry/tests/benchmarks/gfql \
          graphistry/tests/compute/test_ast.py \
          graphistry/tests/compute/test_chain.py \
          graphistry/tests/compute/test_chain_let.py \
          graphistry/tests/compute/test_chain_concat.py \
          graphistry/tests/compute/test_dataframe_primitives.py \
          graphistry/tests/compute/test_gfql.py \
          graphistry/tests/compute/test_gfql_call_validation.py \
          graphistry/tests/compute/test_gfql_exceptions.py \
          graphistry/tests/compute/test_gfql_hypergraph.py \
          graphistry/tests/compute/test_gfql_validate_only.py \
          graphistry/tests/compute/test_gfql_validation.py \
          graphistry/tests/compute/test_hop.py \
          graphistry/tests/compute/gfql \
          graphistry/tests/test_gfql_remote_metadata.py \
          graphistry/tests/test_gfql_remote_persistence.py \
          tests/gfql/ref
        python bin/coverage_audit.py \
          --profile gfql \
          --skip-tests \
          --engine-label ci-pandas-py3.12 \
          --output-dir build/gfql-coverage-audit \
          --data-file build/gfql-coverage-audit/coverage.gfql-py3.12 \
          --baseline-file graphistry/tests/compute/gfql/coverage_baselines/ci-pandas-py3.12.json
        cat build/gfql-coverage-audit/gfql-coverage-audit.md >> "$GITHUB_STEP_SUMMARY"

    - name: Upload GFQL coverage audit
      if: ${{ matrix.python-version == '3.12' }}
      uses: actions/upload-artifact@v4
      with:
        name: gfql-coverage-audit-py3.12
        path: build/gfql-coverage-audit/
        retention-days: 14

    - name: GFQL core tests
      if: ${{ matrix.python-version != '3.12' }}
      run: |
        source pygraphistry/bin/activate
        python -B -m pytest -vv -n auto \
          graphistry/tests/compute/test_ast.py \
          graphistry/tests/compute/test_chain.py \
          graphistry/tests/compute/test_chain_let.py \
          graphistry/tests/compute/test_chain_concat.py \
          graphistry/tests/compute/test_dataframe_primitives.py \
          graphistry/tests/benchmarks/gfql \
          graphistry/tests/compute/test_gfql.py \
          graphistry/tests/compute/test_gfql_call_validation.py \
          graphistry/tests/compute/test_gfql_exceptions.py \
          graphistry/tests/compute/test_gfql_hypergraph.py \
          graphistry/tests/compute/test_gfql_validate_only.py \
          graphistry/tests/compute/test_gfql_validation.py \
          graphistry/tests/compute/test_hop.py \
          graphistry/tests/compute/gfql \
          graphistry/tests/test_gfql_remote_metadata.py \
          graphistry/tests/test_gfql_remote_persistence.py \
          tests/gfql/ref

    - name: T5 rollout gate — execution-path canary (env=true)
      # Default-loose path is exercised by the env-unset run above (T5 #1311).
      # This step asserts the env-on canary path for rollout helper behavior.
      env:
        GRAPHISTRY_GFQL_STRICT_SCHEMA: "true"
      run: |
        source pygraphistry/bin/activate
        python -B -m pytest -vv graphistry/tests/compute/gfql/test_rollout.py

  changed-line-coverage:
    # PR hygiene only: combine coverage collected by existing CPU test jobs and
