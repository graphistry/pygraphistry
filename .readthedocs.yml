# .readthedocs.yml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    # System dependencies - now works because we use jobs instead of commands
    # More closely mirror https://github.com/sphinx-doc/sphinx-docker-images
    - graphviz
    - graphviz-dev  # Headers for pygraphviz compilation
    - imagemagick
    - make
    - pandoc
    - texlive-latex-base
    - texlive-latex-recommended
    - texlive-latex-extra
    - texlive-fonts-recommended
  jobs:
    install:
      # Keep ReadTheDocs on the same uv + hashed-lockfile installation style as CI.
      # Maintainers: RTD consumes requirements/rtd-py3.12.lock directly.
      # Regenerate and commit it after changing RTD's Python version, docs/pygraphviz
      # extras, setup.py dependency constraints, or these install steps:
      #   PROFILES=rtd VERSIONS=3.12 ./bin/generate-lockfiles.sh
      # CI's check-rtd-lockfile job fails when this committed lock is stale.
      - $READTHEDOCS_VIRTUALENV_PATH/bin/python -m pip install --upgrade pip
      - $READTHEDOCS_VIRTUALENV_PATH/bin/python -m pip install "uv==0.11.3"
      - $READTHEDOCS_VIRTUALENV_PATH/bin/uv pip install --python "$READTHEDOCS_VIRTUALENV_PATH/bin/python" --require-hashes -r requirements/rtd-py3.12.lock
      - $READTHEDOCS_VIRTUALENV_PATH/bin/uv pip install --python "$READTHEDOCS_VIRTUALENV_PATH/bin/python" -e . --no-deps
    post_install:
      # Copy content into docs/source after dependency install
      - cp -r demos docs/source/demos
      - cp README.md docs/source/README.md
      - cp ARCHITECTURE.md docs/source/ARCHITECTURE.md
      - cp CONTRIBUTING.md docs/source/CONTRIBUTING.md
      - cp DEVELOP.md docs/source/DEVELOP.md
    build:
      html:
        - sphinx-build -b html -d docs/doctrees docs/source $READTHEDOCS_OUTPUT/html/
      epub:
        - sphinx-build -b epub -d docs/doctrees docs/source docs/_build/epub
        - mkdir -p $READTHEDOCS_OUTPUT/epub
        - cp docs/_build/epub/PyGraphistry.epub $READTHEDOCS_OUTPUT/epub/PyGraphistry.epub
      pdf:
        # Build LaTeX then run pdflatex 3 times to resolve cross-references
        - sphinx-build -b latex -d docs/doctrees docs/source docs/_build/latexpdf
        - cd docs/_build/latexpdf && pdflatex -file-line-error -interaction=nonstopmode PyGraphistry.tex
        - cd docs/_build/latexpdf && pdflatex -file-line-error -interaction=nonstopmode PyGraphistry.tex
        - cd docs/_build/latexpdf && pdflatex -file-line-error -interaction=nonstopmode PyGraphistry.tex
        - mkdir -p $READTHEDOCS_OUTPUT/pdf
        - cp docs/_build/latexpdf/PyGraphistry.pdf $READTHEDOCS_OUTPUT/pdf/PyGraphistry.pdf

formats:
  - pdf
  - epub
  - htmlzip

# sphinx key triggers RTD's Sphinx support for environment/install steps
sphinx:
  configuration: docs/source/conf.py
